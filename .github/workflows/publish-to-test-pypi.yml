name: Publish 📦 to PyPI test server 🐍

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Read package version
        id: version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"package_version={version}\n")
          print(version)
          PY

  verify:
    name: Verify TestPyPI Candidate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build TestPyPI Release (${{ needs.metadata.outputs.package_version }})
    runs-on: ubuntu-latest
    needs: [metadata, verify]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      - name: Sync dependencies
        run: make sync
      - name: Build package
        run: make build
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-${{ needs.metadata.outputs.package_version }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish TestPyPI Release (${{ needs.metadata.outputs.package_version }})
    runs-on: ubuntu-latest
    needs: [metadata, build]
    permissions:
      contents: read
      id-token: write
    environment: testpypi
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ needs.metadata.outputs.package_version }}
          path: dist
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
