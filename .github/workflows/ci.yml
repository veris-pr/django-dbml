name: CI

on:
  workflow_call:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, Django ${{ matrix.django-name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            django-name: "4.2"
            django-constraint: "django>=4.2,<4.3"
          - python-version: "3.11"
            django-name: "5.0"
            django-constraint: "django>=5.0,<5.1"
          - python-version: "3.11"
            django-name: "5.1"
            django-constraint: "django>=5.1,<5.2"
          - python-version: "3.11"
            django-name: "5.2"
            django-constraint: "django>=5.2,<5.3"
          - python-version: "3.12"
            django-name: "4.2"
            django-constraint: "django>=4.2,<4.3"
          - python-version: "3.12"
            django-name: "5.0"
            django-constraint: "django>=5.0,<5.1"
          - python-version: "3.12"
            django-name: "5.1"
            django-constraint: "django>=5.1,<5.2"
          - python-version: "3.12"
            django-name: "5.2"
            django-constraint: "django>=5.2,<5.3"
          - python-version: "3.13"
            django-name: "5.1"
            django-constraint: "django>=5.1,<5.2"
          - python-version: "3.13"
            django-name: "5.2"
            django-constraint: "django>=5.2,<5.3"
          - python-version: "3.14"
            django-name: "5.2"
            django-constraint: "django>=5.2,<5.3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "${{ matrix.python-version }}"
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      - name: Run tests
        run: make test-django PYTHON=${{ matrix.python-version }} DJANGO_CONSTRAINT='${{ matrix.django-constraint }}'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      - name: Sync dependencies
        run: make sync
      - name: Run lint
        run: make lint

  package-check:
    name: Package Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      - name: Build package
        run: make build
